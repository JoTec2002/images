name: Super Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag or commit ref from super-productivity repo (leave blank for latest release)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/super-sync
  UPSTREAM_REPO: super-productivity/super-productivity

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Get Latest Upstream Release
        id: upstream
        run: |
          # If manual input is provided, use it. Otherwise, fetch the latest release tag from API.
          if [ -n "${{ inputs.ref }}" ]; then
            echo "RELEASE_TAG=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name)
            echo "RELEASE_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi
          echo "Detected Tag: $LATEST_TAG"

      - name: Check if image already exists
        id: check-tag
        run: |
          # Check GHCR to see if we already built this tag to prevent infinite loops/waste
          TOKEN=$(echo "${{ secrets.GITHUB_TOKEN }}" | base64)
          RESPONSE=$(curl -s -o /dev/null -I -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/${{ steps.upstream.outputs.RELEASE_TAG }})
          
          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.upstream.outputs.RELEASE_TAG }} already exists in registry. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Checkout super-productivity at ref
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ inputs.ref }}

      - name: Inject baseline Prisma migration
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          # The super-sync-server was bootstrapped with `prisma db push`, so there is no
          # initial CREATE TABLE migration. Without this baseline, `prisma migrate deploy`
          # (run in the container CMD) fails on a fresh database because all existing
          # migrations are ALTER TABLE statements that assume the tables already exist.
          mkdir -p packages/super-sync-server/prisma/migrations/20200101000000_init
          cat > packages/super-sync-server/prisma/migrations/20200101000000_init/migration.sql << 'SQLEOF'
          -- Baseline migration: create initial schema
          -- Tables were originally created via `prisma db push` (no migration file was generated).
          -- This file establishes the schema state that existed before the first incremental migration.

          CREATE TABLE "users" (
              "id" SERIAL NOT NULL,
              "email" TEXT NOT NULL,
              "password_hash" TEXT NOT NULL,
              "is_verified" INTEGER NOT NULL DEFAULT 0,
              "verification_token" TEXT,
              "verification_token_expires_at" BIGINT,
              "verification_resend_count" INTEGER NOT NULL DEFAULT 0,
              "login_token" TEXT,
              "login_token_expires_at" BIGINT,
              "failed_login_attempts" INTEGER NOT NULL DEFAULT 0,
              "locked_until" BIGINT,
              "token_version" INTEGER NOT NULL DEFAULT 0,
              "terms_accepted_at" BIGINT,
              "created_at" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP,

              CONSTRAINT "users_pkey" PRIMARY KEY ("id")
          );

          CREATE UNIQUE INDEX "users_email_key" ON "users"("email");
          CREATE INDEX "users_verification_token_idx" ON "users"("verification_token");
          CREATE INDEX "users_login_token_idx" ON "users"("login_token");

          CREATE TABLE "operations" (
              "id" TEXT NOT NULL,
              "user_id" INTEGER NOT NULL,
              "client_id" TEXT NOT NULL,
              "server_seq" INTEGER NOT NULL,
              "action_type" TEXT NOT NULL,
              "op_type" TEXT NOT NULL,
              "entity_type" TEXT NOT NULL,
              "entity_id" TEXT,
              "payload" JSONB NOT NULL,
              "vector_clock" JSONB NOT NULL,
              "schema_version" INTEGER NOT NULL,
              "client_timestamp" BIGINT NOT NULL,
              "received_at" BIGINT NOT NULL,

              CONSTRAINT "operations_pkey" PRIMARY KEY ("id")
          );

          CREATE UNIQUE INDEX "operations_user_id_server_seq_key" ON "operations"("user_id", "server_seq");
          CREATE INDEX "operations_user_id_server_seq_idx" ON "operations"("user_id", "server_seq");
          CREATE INDEX "operations_user_id_entity_type_entity_id_idx" ON "operations"("user_id", "entity_type", "entity_id");
          CREATE INDEX "operations_user_id_client_id_idx" ON "operations"("user_id", "client_id");
          CREATE INDEX "operations_user_id_received_at_idx" ON "operations"("user_id", "received_at");

          CREATE TABLE "user_sync_state" (
              "user_id" INTEGER NOT NULL,
              "last_seq" INTEGER NOT NULL DEFAULT 0,
              "last_snapshot_seq" INTEGER,
              "snapshot_data" BYTEA,
              "snapshot_at" BIGINT,
              "snapshot_schema_version" INTEGER DEFAULT 1,

              CONSTRAINT "user_sync_state_pkey" PRIMARY KEY ("user_id")
          );

          CREATE TABLE "sync_devices" (
              "client_id" TEXT NOT NULL,
              "user_id" INTEGER NOT NULL,
              "device_name" TEXT,
              "user_agent" TEXT,
              "last_seen_at" BIGINT NOT NULL,
              "last_acked_seq" INTEGER NOT NULL DEFAULT 0,
              "created_at" BIGINT NOT NULL,

              CONSTRAINT "sync_devices_pkey" PRIMARY KEY ("user_id", "client_id")
          );

          ALTER TABLE "operations" ADD CONSTRAINT "operations_user_id_fkey"
              FOREIGN KEY ("user_id") REFERENCES "users"("id") ON DELETE CASCADE ON UPDATE CASCADE;

          ALTER TABLE "user_sync_state" ADD CONSTRAINT "user_sync_state_user_id_fkey"
              FOREIGN KEY ("user_id") REFERENCES "users"("id") ON DELETE CASCADE ON UPDATE CASCADE;

          ALTER TABLE "sync_devices" ADD CONSTRAINT "sync_devices_user_id_fkey"
              FOREIGN KEY ("user_id") REFERENCES "users"("id") ON DELETE CASCADE ON UPDATE CASCADE;
          SQLEOF

      - name: Compute image tags
        if: steps.check-tag.outputs.exists == 'false'
        id: tags
        run: |
          REF="${{ inputs.ref }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # If ref looks like a version tag (starts with v followed by a digit), also tag latest
          if echo "$REF" | grep -qE '^v[0-9]'; then
            echo "tags=${IMAGE}:${REF},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:${REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check-tag.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.check-tag.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check-tag.outputs.exists == 'false'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/super-sync-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Super Sync Server
            org.opencontainers.image.description=Super Sync Server from super-productivity
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ inputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Generate artifact attestation
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image details
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          echo "Image pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.tags.outputs.tags }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
